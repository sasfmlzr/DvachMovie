plugins {
    alias(libs.plugins.ksp)
    id("com.android.library")
}

android {
    namespace = "com.dvachmovie.android.dataandroid"
    compileSdkVersion rootProject.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    defaultConfig {
        minSdkVersion rootProject.minSdkVersion
        targetSdkVersion rootProject.targetSdkVersion
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            minifyEnabled false
            shrinkResources false
            enableUnitTestCoverage true
            enableAndroidTestCoverage true
        }
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
        androidTest.java.srcDirs += 'src/androidTest/kotlin'
    }
}
kotlin {
    compilerOptions {
        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_21)
    }
}
dependencies {
    implementation libs.kotlinSdk
    implementation libs.appcompat

    implementation libs.dagger.dagger
    ksp libs.dagger.compiler

    implementation libs.coroutines.core

    api libs.room
    ksp libs.room.compiler

    implementation libs.jodaTime

    implementation project(':domain')

    testImplementation libs.testing.junit
    testImplementation libs.testing.mockito

    androidTestImplementation libs.testing.runner
    androidTestImplementation libs.testing.espresso
    androidTestImplementation libs.testing.junitExtension
    androidTestImplementation libs.testing.mockito
    testImplementation libs.testing.junit
    testImplementation libs.testing.mockito
}
